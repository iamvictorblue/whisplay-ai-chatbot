<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whisplay Web Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="screen">
      <div class="screen-inner">
        <div class="header">
          <div class="status-bar">
            <div class="status" id="statusText">starting</div>
            <div class="status-icons">
              <img class="status-icon" id="imageIcon" src="/img/image.png" alt="image" />
              <img class="status-icon" id="ragIcon" src="/img/rag.png" alt="rag" />
              <img class="status-icon" id="netIcon" src="/img/wifi.png" alt="network" />
              <div class="battery">
                <div class="battery-shell">
                  <div class="battery-fill" id="batteryFill"></div>
                </div>
                <span id="batteryText">--%</span>
              </div>
            </div>
          </div>
          <div class="status-subline">secure tactical comms channel</div>
        </div>
        <div class="body">
          <div class="codec-layout">
            <div class="codec-top">
              <div class="portrait-panel" id="callerPanel">
                <img class="portrait-img" id="callerPortrait" src="/img/MGS_PS1-Topless-snake.png" alt="caller portrait" />
                <div class="portrait-fallback"></div>
                <div class="portrait-scan"></div>
              </div>

              <div class="center-panel">
                <div class="ptt-label">PTT</div>
                <div class="center-main">
                  <div class="ptt-meter" id="pttMeter" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                  <div class="freq-stack">
                    <div class="freq-readout" id="freqText">140.85</div>
                    <div class="voice-state" id="voiceState">STBY</div>
                  </div>
                </div>
                <div class="codec-controls">
                  <span>mem.</span>
                  <span>tune</span>
                </div>
              </div>

              <div class="portrait-panel" id="calleePanel">
                <img class="portrait-img" id="calleePortrait" src="/img/MGS_PS1-Ocaton-final.png" alt="callee portrait" />
                <div class="portrait-fallback"></div>
                <div class="portrait-scan"></div>
              </div>
            </div>

            <div class="dialogue-panel">
              <div class="text-viewport">
                <div class="text-content" id="textContent"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="image-layer" id="imageLayer">
          <img id="imageDisplay" alt="display" />
        </div>
        <div class="dim" id="dim"></div>
      </div>
    </div>
    <div class="side">
      <div class="card">
        <div class="title">RGB LED</div>
        <div class="led" id="led"></div>
        <div class="status-text" id="ledText">--</div>
      </div>
      <div class="card">
        <div class="title">Button</div>
        <button class="button" id="btn">PRESS</button>
        <div class="status-text" id="btnText">released</div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
